<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/style.css">
    <link rel="stylesheet" href="styles/login.css">
    <title>Fazer login</title>
</head>

<body>
    <h1>Agenda</h1>
    <main>
        <div class="aviso-erro display-none" id="aviso-erro"></div>
        <form id="login-form" action="/login" method="POST">
            <h2>Fazer login</h2>
            <label>
                Nome do usuário:
                <input maxlength="40" name="nome" pattern="[\w\d]+" required>
            </label>
            <label>
                Senha:
                <input type="password" name="senha" required>
            </label>
            <button type="submit" class="destaque">
                Fazer login
            </button>
            <small>Não tem uma conta? <a href="#registrar">Criar conta</a></small>
        </form>
        <form class="display-none" id="registrar-form" action="/registrar" method="POST">
            <h2>Criar conta</h2>
            <label>
                Nome do usuário:
                <input maxlength="40" type="text" name="nome" pattern="[\w\d]+" required>
            </label>
            <label>
                Senha:
                <input type="password" name="senha" required>
            </label>
            <label>
                Confirmar senha:
                <input type="password" id="senha-repete" required>
            </label>
            <button type="submit" class="destaque">
                Criar conta
            </button>
            <small>Já tem uma conta? <a href="#login">Fazer login</a></small>
        </form>
    </main>

    <script src="scripts/auth.js"></script>
    <script src="scripts/login.js"></script>
</body>

</html>
